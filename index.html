<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Issues Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --surface2: #1a1e28;
    --border:   #252936;
    --border2:  #2e3347;
    --text:     #e8eaf0;
    --muted:    #6b7089;
    --accent:   #5b6fff;
    --accent2:  #7c8fff;
    --green:    #3dd68c;
    --purple:   #a78bfa;
    --danger:   #f87171;
    --mono:     'DM Mono', monospace;
    --display:  'Syne', sans-serif;
    --body:     'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .hidden { display: none !important; }

  /* ─── LOGIN ─── */
  .login-page {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .login-page::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(91,111,255,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
  }

  .login-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-mark {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: white;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .login-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .field-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  .login-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-card input:focus {
    border-color: var(--accent);
  }

  .login-card input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    margin-top: 28px;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), #7c8fff);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .demo-hint {
    margin-top: 16px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .demo-hint span {
    color: var(--accent2);
  }

  /* ─── DASHBOARD WRAPPER ─── */
  #dashboard {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 28px 60px;
  }

  /* ─── NAVBAR ─── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0 20px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--display);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.2px;
    white-space: nowrap;
  }

  .search-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .btn-search {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    color: white;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-search:hover { background: var(--accent2); }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    gap: 6px;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .tabs button {
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 999px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }

  .tabs button:hover { border-color: var(--accent); color: var(--text); }

  .tabs button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ─── STATS BAR ─── */
  .stats {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stats-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stats-icon {
    width: 38px; height: 38px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 15px;
    color: var(--accent2);
    font-weight: 500;
  }

  .stats-count {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
  }

  .stats-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    letter-spacing: 0.3px;
  }

  .stats-right { display: flex; gap: 8px; flex-wrap: wrap; }

  .badge {
    padding: 5px 13px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }

  .badge.open {
    background: rgba(61,214,140,0.1);
    color: var(--green);
    border: 1px solid rgba(61,214,140,0.2);
  }

  .badge.open::before { background: var(--green); }

  .badge.closed {
    background: rgba(167,139,250,0.1);
    color: var(--purple);
    border: 1px solid rgba(167,139,250,0.2);
  }

  .badge.closed::before { background: var(--purple); }

  /* ─── GRID ─── */
  .container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-top: 18px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--border2);
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }

  .card-accent-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card-accent-line.open  { background: linear-gradient(90deg, var(--green), transparent); }
  .card-accent-line.closed { background: linear-gradient(90deg, var(--purple), transparent); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card h3 {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.1px;
    color: var(--text);
  }

  .status-pip {
    flex-shrink: 0;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 4px;
  }

  .status-pip.open   { background: var(--green); box-shadow: 0 0 6px rgba(61,214,140,0.5); }
  .status-pip.closed { background: var(--purple); }

  .card-desc {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: auto;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .meta-row .key { color: var(--border2); }
  .meta-row .val { color: var(--text); opacity: 0.75; }

  .priority-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .priority-tag.high   { background: rgba(248,113,113,0.15); color: var(--danger); }
  .priority-tag.medium { background: rgba(251,191,36,0.12); color: #fbbf24; }
  .priority-tag.low    { background: rgba(61,214,140,0.1);  color: var(--green); }

  .labels-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .label-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
  }

  /* ─── MODAL ─── */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 30px;
    max-width: 520px;
    width: 100%;
    position: relative;
    animation: modalIn 0.2s ease both;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-content::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 20px 20px 0 0;
    background: linear-gradient(90deg, var(--accent), var(--purple));
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    width: 30px; height: 30px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
  }

  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-title {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
    margin-bottom: 10px;
    padding-right: 40px;
  }

  .modal-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .modal-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .modal-field {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }

  .modal-field .mf-key {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.7px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .modal-field .mf-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .modal-labels {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  /* ─── SPINNER ─── */
  .spinner-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,15,20,0.8);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 16px;
  }

  .spinner-ring {
    width: 44px; height: 44px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .spinner-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1100px) {
    .container { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 820px) {
    .container { grid-template-columns: repeat(2, 1fr); }
    .modal-fields { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    #dashboard { padding: 0 16px 48px; }
    .navbar { flex-direction: column; align-items: stretch; gap: 12px; }
    .search-wrap input { min-width: unset; width: 100%; }
    .search-wrap { width: 100%; }
    .container { grid-template-columns: 1fr; }
    .login-card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo-mark">GI</div>
      <div>
        <div class="login-title">Issues Tracker</div>
        <div class="login-sub">Sign in to manage your repository issues</div>
      </div>
    </div>

    <label class="field-label" for="username">Username</label>
    <input id="username" type="text" placeholder="admin" autocomplete="username"/>

    <label class="field-label" for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>

    <button class="btn-login" onclick="login()">Sign In →</button>
    <p class="demo-hint">Demo credentials: <span>admin</span> / <span>admin123</span></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <nav class="navbar">
    <div class="brand">
      <div class="logo-mark">GI</div>
      Issues Tracker
    </div>
    <div class="search-wrap">
      <input id="searchInput" placeholder="Search issues…" onkeyup="handleSearchKey(event)"/>
      <button class="btn-search" onclick="searchIssue()">Search</button>
    </div>
  </nav>

  <div class="tabs" id="tabs">
    <button onclick="filterIssues('all')" data-filter="all" class="active">All</button>
    <button onclick="filterIssues('open')" data-filter="open">Open</button>
    <button onclick="filterIssues('closed')" data-filter="closed">Closed</button>
  </div>

  <div class="stats" id="stats">
    <div class="stats-left">
      <div class="stats-icon">#</div>
      <div>
        <div class="stats-count" id="issuesCount">0 issues</div>
        <div class="stats-hint" id="issuesHint">Fetching data…</div>
      </div>
    </div>
    <div class="stats-right">
      <span class="badge open" id="openCount">Open: 0</span>
      <span class="badge closed" id="closedCount">Closed: 0</span>
    </div>
  </div>

  <div id="issuesContainer" class="container"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="closeModal(event)">✕</button>
  </div>
</div>

<!-- SPINNER -->
<div id="spinner" class="spinner-overlay">
  <div class="spinner-ring"></div>
  <div class="spinner-text">Loading issues…</div>
</div>

<script>
  let allIssues = [], currentFilter = 'all'

  function setLoading(v) {
    document.getElementById('spinner').style.display = v ? 'flex' : 'none'
  }

  function login() {
    const u = document.getElementById('username').value.trim()
    const p = document.getElementById('password').value.trim()
    if (u === 'admin' && p === 'admin123') {
      document.getElementById('loginPage').classList.add('hidden')
      document.getElementById('dashboard').classList.remove('hidden')
      loadIssues()
    } else {
      alert('Invalid credentials.')
    }
  }

  async function loadIssues() {
    setLoading(true)
    try {
      const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues')
      const data = await res.json()
      allIssues = data.data || []
      applyFilter(currentFilter)
    } catch {
      alert('Failed to load issues.')
    } finally {
      setLoading(false)
    }
  }

  function updateStats(issues, hint) {
    const open   = allIssues.filter(i => i.status === 'open').length
    const closed = allIssues.filter(i => i.status === 'closed').length
    document.getElementById('issuesCount').textContent = `${issues.length} issue${issues.length === 1 ? '' : 's'}`
    document.getElementById('issuesHint').textContent  = hint || 'Showing all issues'
    document.getElementById('openCount').textContent   = `Open: ${open}`
    document.getElementById('closedCount').textContent = `Closed: ${closed}`
  }

  function setActiveTab(f) {
    currentFilter = f
    document.querySelectorAll('#tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f)
    })
  }

  function priorityClass(p) {
    if (!p) return ''
    const l = p.toLowerCase()
    if (l === 'high') return 'high'
    if (l === 'medium') return 'medium'
    return 'low'
  }

  function displayIssues(issues) {
    const c = document.getElementById('issuesContainer')
    c.innerHTML = ''
    if (!issues.length) {
      c.innerHTML = `<div class="empty-state"><div class="icon">🔍</div>No issues found.</div>`
      updateStats([], 'No results')
      return
    }
    issues.forEach((issue, idx) => {
      const card = document.createElement('div')
      card.className = 'card'
      card.style.animationDelay = `${idx * 40}ms`

      const pClass = priorityClass(issue.priority)
      const labels = (issue.labels || []).map(l => `<span class="label-tag">${l}</span>`).join('')
      const date   = new Date(issue.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })

      card.innerHTML = `
        <div class="card-accent-line ${issue.status}"></div>
        <div class="card-header">
          <h3>${issue.title}</h3>
          <div class="status-pip ${issue.status}"></div>
        </div>
        <div class="card-desc">${issue.description || '—'}</div>
        <div class="card-meta">
          <div class="meta-row">
            <span class="key">author</span>
            <span class="val">${issue.author}</span>
          </div>
          <div class="meta-row">
            <span class="key">priority</span>
            <span class="priority-tag ${pClass}">${issue.priority || 'none'}</span>
          </div>
          <div class="meta-row">
            <span class="key">created</span>
            <span class="val">${date}</span>
          </div>
        </div>
        ${labels ? `<div class="labels-row">${labels}</div>` : ''}
      `
      card.addEventListener('click', () => showModal(issue))
      c.appendChild(card)
    })

    const hint = currentFilter === 'all'
      ? 'Showing all issues'
      : currentFilter
      ? `Showing ${currentFilter} issues`
      : 'Search results'
    updateStats(issues, hint)
  }

  function applyFilter(type) {
    setActiveTab(type)
    displayIssues(type === 'all' ? allIssues : allIssues.filter(i => i.status === type))
  }

  function filterIssues(type) { applyFilter(type) }

  async function searchIssue() {
    const text = document.getElementById('searchInput').value.trim()
    if (!text) { applyFilter(currentFilter); return }
    setLoading(true)
    try {
      const res  = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${encodeURIComponent(text)}`)
      const data = await res.json()
      setActiveTab('')
      displayIssues(data.data || [])
    } catch { alert('Search failed.') }
    finally { setLoading(false) }
  }

  function handleSearchKey(e) { if (e.key === 'Enter') searchIssue() }

  function showModal(issue) {
    const date  = new Date(issue.createdAt).toLocaleString('en-US', { dateStyle:'medium', timeStyle:'short' })
    const pClass = priorityClass(issue.priority)
    const labels = (issue.labels || []).map(l => `<span class="label-tag">${l}</span>`).join('')
    const mc = document.getElementById('modalContent')
    mc.innerHTML = `
      <button class="modal-close" onclick="closeModal(event)">✕</button>
      <div class="modal-title">${issue.title}</div>
      <div class="modal-desc">${issue.description || 'No description provided.'}</div>
      <div class="modal-fields">
        <div class="modal-field">
          <div class="mf-key">Status</div>
          <div class="mf-val"><span class="badge ${issue.status}" style="padding:3px 10px">${issue.status}</span></div>
        </div>
        <div class="modal-field">
          <div class="mf-key">Priority</div>
          <div class="mf-val"><span class="priority-tag ${pClass}">${issue.priority || 'none'}</span></div>
        </div>
        <div class="modal-field">
          <div class="mf-key">Author</div>
          <div class="mf-val">${issue.author}</div>
        </div>
        <div class="modal-field">
          <div class="mf-key">Created</div>
          <div class="mf-val">${date}</div>
        </div>
        ${labels ? `<div class="modal-field" style="grid-column:1/-1">
          <div class="mf-key">Labels</div>
          <div class="modal-labels" style="margin-top:6px">${labels}</div>
        </div>` : ''}
      </div>
    `
    document.getElementById('modal').style.display = 'flex'
  }

  function closeModal(e) {
    if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return
    document.getElementById('modal').style.display = 'none'
  }
</script>
</body>
</html>
